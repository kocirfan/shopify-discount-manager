query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      cost {
        totalAmount {
          amount
        }
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
    }
    buyerIdentity {
      customer {
        exactDiscountCode: metafield(namespace: "custom", key: "exact_discount_code") {
          value
        }
        discountPercentage: metafield(namespace: "custom", key: "customer_discount_percentage") {
          value
        }
        hasTags(tags: ["korting-5", "korting-10", "korting-15", "korting-20", "korting-25", "korting-30", "korting-35", "korting-40", "korting-45", "korting-50"]) {
          hasTag
          tag
        }
      }
    }
  }
  shop {
    customerTagDiscountRules: metafield(namespace: "customer_tag_discount", key: "rules") {
      value
    }
  }
}
